<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Что играем?</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0a; color: #dde0f8;
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 28px;
}
h1 {
  font-size: 24px; font-weight: 700; letter-spacing: -0.02em;
  margin-bottom: 8px; color: #fff500;
}
.sub {
  font-size: 13px; color: #4a4a68; margin-bottom: 36px;
  line-height: 1.6; text-align: center;
}
.services {
  display: flex; gap: 10px; margin-bottom: 24px;
}
.svc {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  padding: 4px 10px; border-radius: 4px;
}
.svc.yt { background: #f00; color: #fff; }
.svc.sc { background: #ff5500; color: #fff; }
.svc.sp { background: #1db954; color: #fff; }
input {
  width: 100%; max-width: 400px;
  background: #0d0d1a; border: 1px solid #161628;
  border-radius: 12px; color: #dde0f8; font-size: 15px;
  padding: 14px 16px; outline: none; margin-bottom: 12px;
  transition: border-color 0.15s;
  -webkit-user-select: auto; user-select: auto;
}
input:focus { border-color: #fff500; }
input::placeholder { color: #2e2e48; }
button {
  width: 100%; max-width: 400px;
  background: #fff500; color: #000; border: none; border-radius: 12px;
  font-size: 15px; font-weight: 700; letter-spacing: 0.02em;
  padding: 14px; cursor: pointer; transition: opacity 0.15s;
}
button:active { opacity: 0.7; }
.err {
  display: none; font-size: 12px; color: #ff4444;
  margin-top: 10px; text-align: center;
}
.success {
  display: none; flex-direction: column;
  align-items: center; gap: 14px;
}
.ok-icon { font-size: 52px; color: #fff500; }
.ok-txt { font-size: 20px; font-weight: 700; color: #fff; }
.ok-sub { font-size: 13px; color: #4a4a68; }
</style>
</head>
<body>
<h1>Что играем?</h1>
<p class="sub">Вставь ссылку на плейлист или трек</p>
<div class="services">
  <span class="svc yt">YT</span>
  <span class="svc sc">SC</span>
  <span class="svc sp">SP</span>
</div>
<input id="url-input" type="url" placeholder="Вставь ссылку сюда" autofocus>
<input id="title-input" type="text" placeholder="Название (необязательно)" spellcheck="false">
<button id="go-btn">Запустить ▶</button>
<div class="err" id="err-msg"></div>

<div class="success" id="success">
  <div class="ok-icon">▶</div>
  <div class="ok-txt">Принято!</div>
  <div class="ok-sub">Сейчас включим</div>
</div>

<script>
const sid = new URLSearchParams(location.search).get('s') || 'stable';

document.getElementById('go-btn').addEventListener('click', submit);
document.getElementById('url-input').addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });

function extractUrl(text) {
  const m = text.match(/https?:\/\/\S+/);
  if (m) return m[0];
  const t = text.trim();
  return t.startsWith('http') ? t : 'https://' + t;
}

async function submit() {
  const raw    = document.getElementById('url-input').value.trim();
  const urlVal = raw ? extractUrl(raw) : '';
  const titleVal = document.getElementById('title-input').value.trim();
  const errEl  = document.getElementById('err-msg');
  errEl.style.display = 'none';
  if (!urlVal) return;
  try {
    const r = await fetch('/api/guest-submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sid, url: urlVal, title: titleVal || null }),
    });
    const d = await r.json();
    if (d.error === 'session_expired') {
      errEl.textContent = 'Сессия истекла. Сканируй QR заново.';
      errEl.style.display = 'block';
      return;
    }
    if (d.ok) {
      document.querySelector('h1').style.display = 'none';
      document.querySelector('.sub').style.display = 'none';
      document.querySelector('.services').style.display = 'none';
      document.getElementById('url-input').style.display = 'none';
      document.getElementById('title-input').style.display = 'none';
      document.getElementById('go-btn').style.display = 'none';
      document.getElementById('success').style.display = 'flex';
    }
  } catch {
    errEl.textContent = 'Ошибка. Попробуй ещё раз.';
    errEl.style.display = 'block';
  }
}
</script>
</body>
</html>
