{% extends "base.html" %}
{% set active = 'dash' %}

{% block content %}
<h2>
  <span class="status-dot {% if mqtt_ok %}ok{% else %}err{% endif %}"></span>
  Освещение
</h2>

<div class="light-grid">
{% for ch, info in lights.items() %}
<div class="light-card">
  <div class="light-name">{{ info.name }}</div>
  <div class="light-state {% if info.state == true %}on{% elif info.state == false %}off{% endif %}">
    {% if info.state == true %}ON
    {% elif info.state == false %}OFF
    {% else %}—{% endif %}
  </div>
  <div class="btn-row">
    <form method="post" action="/lights/{{ ch }}/on" style="display:inline">
      <button type="submit" class="btn {% if info.state == true %}on{% endif %}">Вкл</button>
    </form>
    <form method="post" action="/lights/{{ ch }}/off" style="display:inline">
      <button type="submit" class="btn {% if info.state == false %}off{% endif %}">Выкл</button>
    </form>
  </div>
</div>
{% endfor %}
</div>

<div class="ts">{{ now }}</div>
{% endblock %}
