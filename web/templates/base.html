<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}СИЛЬНО·ДОМ{% endblock %}</title>
<style>
:root{
  --bg:#000;--bg1:#111;--bg2:#1a1a1a;
  --text:#fff;--text2:#999;--text3:#555;
  --accent:#fff500;--border:#222;
  --on:#fff500;--off:#333;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
a{color:inherit;text-decoration:none}

nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border)}
.nav-logo{font-size:.75rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--accent)}
.nav-links{display:flex;gap:24px}
.nav-links a{font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text2)}
.nav-links a:hover,.nav-links a.active{color:var(--text)}

.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--text3);margin-right:6px}
.status-dot.ok{background:#4ade80}
.status-dot.err{background:#f87171}

main{padding:32px 24px;max-width:960px}
h2{font-size:.7rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--text2);margin-bottom:20px}

.card{background:var(--bg1);border:1px solid var(--border);border-radius:4px;padding:20px}
.card + .card{margin-top:12px}

.light-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:32px}
.light-card{background:var(--bg1);border:1px solid var(--border);border-radius:4px;padding:20px}
.light-name{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);margin-bottom:8px}
.light-state{font-size:1.5rem;font-weight:700;margin-bottom:16px}
.light-state.on{color:var(--accent)}
.light-state.off{color:var(--text3)}
.btn-row{display:flex;gap:8px}
.btn{padding:7px 16px;border:1px solid var(--border);border-radius:3px;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;background:transparent;color:var(--text);font-family:inherit}
.btn:hover{border-color:var(--text3)}
.btn.on{background:var(--accent);color:#000;border-color:var(--accent)}
.btn.on:hover{background:#e6dc00}
.btn.off{color:var(--text2)}

.ts{font-size:.65rem;color:var(--text3);margin-top:24px}

pre{font-size:.75rem;line-height:1.6;color:var(--text2);white-space:pre-wrap;word-break:break-all}
</style>
{% block head %}{% endblock %}
</head>
<body>
<nav>
  <span class="nav-logo">СИЛЬНО · ДОМ</span>
  <div class="nav-links">
    <a href="/" {% if active=='dash' %}class="active"{% endif %}>Свет</a>
    <a href="/config" {% if active=='config' %}class="active"{% endif %}>Конфиг</a>
    <a href="/logout">Выход</a>
  </div>
</nav>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
